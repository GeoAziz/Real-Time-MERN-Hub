name: cd

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install argocd CLI
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          curl -fL --retry 3 --retry-delay 2 -o "$tmp_dir/argocd" https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x "$tmp_dir/argocd"
          sudo install -m 0755 "$tmp_dir/argocd" /usr/local/bin/argocd

      - name: Prepare ArgoCD connection
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${ARGOCD_SERVER:-}" ]]; then
            echo "ARGOCD_SERVER secret is required"
            exit 1
          fi

          if [[ -z "${ARGOCD_AUTH_TOKEN:-}" ]]; then
            echo "ARGOCD_AUTH_TOKEN secret is required"
            exit 1
          fi

          normalized_server="${ARGOCD_SERVER#https://}"
          normalized_server="${normalized_server#http://}"
          normalized_server="${normalized_server%/}"

          if [[ -z "$normalized_server" ]]; then
            echo "ARGOCD_SERVER resolved to an empty value"
            exit 1
          fi

          echo "ARGOCD_SERVER=$normalized_server" >> "$GITHUB_ENV"
          echo "ARGOCD_AUTH_TOKEN=$ARGOCD_AUTH_TOKEN" >> "$GITHUB_ENV"

      - name: Login to ArgoCD
        run: |
          set -euo pipefail
          argocd login "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --grpc-web

      - name: Sync dev and prod apps
        run: |
          argocd app sync mern-chatapp-dev --grpc-web
          argocd app wait mern-chatapp-dev --health --sync --timeout 600 --grpc-web
          argocd app sync mern-chatapp-prod --grpc-web
          argocd app wait mern-chatapp-prod --health --sync --timeout 600 --grpc-web
