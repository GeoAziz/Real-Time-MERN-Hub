apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mern-chatapp
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - chat.example.com
      secretName: mern-chatapp-tls
  rules:
    - host: chat.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mern-chatapp
                port:
                  number: 80
