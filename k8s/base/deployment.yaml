apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-chatapp
  labels:
    app: mern-chatapp
spec:
  replicas: 1
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mern-chatapp
  template:
    metadata:
      labels:
        app: mern-chatapp
      annotations:
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/role: 'mern-chatapp'
        vault.hashicorp.com/agent-inject-secret-env: 'secret/data/mern-chatapp'
        vault.hashicorp.com/agent-inject-template-env: |
          {{- with secret "secret/data/mern-chatapp" -}}
          export MONGO_URI="{{ .Data.data.MONGO_URI }}"
          export JWT_SECRET="{{ .Data.data.JWT_SECRET }}"
          export CLOUDINARY_CLOUD_NAME="{{ .Data.data.CLOUDINARY_CLOUD_NAME }}"
          export CLOUDINARY_API_KEY="{{ .Data.data.CLOUDINARY_API_KEY }}"
          export CLOUDINARY_API_SECRET="{{ .Data.data.CLOUDINARY_API_SECRET }}"
          {{- end }}
    spec:
      serviceAccountName: mern-chatapp
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: app
          image: ghcr.io/your-username/mern-chatapp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -ec
          args:
            - |
              if [ -f /vault/secrets/env ]; then
                . /vault/secrets/env
              fi
              exec node server/server.js
          envFrom:
            - configMapRef:
                name: mern-chatapp-config
            - secretRef:
                name: mern-chatapp-secret
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /api/health
              port: 5000
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
